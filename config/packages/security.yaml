security:
    password_hashers:
        App\Entity\User: 'auto'

    role_hierarchy:
        ROLE_ADMIN: [ROLE_AGENT]

    providers:
        app_users:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api:
            pattern: ^/api/v1(?:/|$)
            stateless: true
            entry_point: App\Security\ApiAuthenticationFailureHandler
            access_token:
                token_handler: App\Security\ApiTokenHandler
                failure_handler: App\Security\ApiAuthenticationFailureHandler
        main:
            lazy: true
            provider: app_users
            user_checker: App\Security\ActiveUserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                enable_csrf: true
                csrf_token_id: authenticate
                default_target_path: app_dashboard
                always_use_default_target_path: true
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            logout:
                path: app_logout
                target: app_login
                enable_csrf: true
                csrf_token_id: logout

    access_control:
        - { path: ^/health/(live|ready)$, roles: PUBLIC_ACCESS }
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1(?:/|$), roles: ROLE_API_CLIENT }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
